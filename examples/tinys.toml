# Package manifest for the examples.
#
# `tinys build`/`run`/`check` look for the nearest `tinys.toml` above the source
# file and forward these dependencies to the generated Cargo package. Only the
# crates a program actually imports are included, so the dependency-free
# examples still build offline.

[package]
name = "examples"
version = "0.1.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
